<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .header {
            background: #fff;
            padding: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
        }
        .header h1 {
            font-size: 24px;
            color: #333;
        }
        .nav {
            margin-top: 15px;
        }
        .nav a {
            display: inline-block;
            padding: 8px 16px;
            margin-right: 10px;
            background: #333;
            color: #fff;
            text-decoration: none;
            border: 1px solid #333;
        }
        .nav a:hover {
            background: #555;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .form-box {
            background: #fff;
            padding: 30px;
            border: 1px solid #ddd;
        }
        .form-box h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #333;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            background: #555;
        }
        .message {
            padding: 10px;
            margin-bottom: 15px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            color: #333;
        }
        .link-text {
            margin-top: 15px;
            text-align: center;
            color: #666;
        }
        .link-text a {
            color: #333;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Parking Management System</h1>
        <div class="nav">
            <a href="/">Home</a>
            <a href="/login/">Login</a>
            <a href="/register/">Register</a>
        </div>
    </div>

    <div class="container">
        <div class="form-box">
            <h2>Register</h2>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username:</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" name="password1" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password:</label>
                    <input type="password" name="password2" required>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
            
            <div class="link-text">
                Already have an account? <a href="/login/">Login here</a>
            </div>
        </div>
    </div>
</body>
</html>
